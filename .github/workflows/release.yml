name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Both jobs publish to the same tag and each rewrites latest.json for the
      # updater. Running them concurrently races that manifest and can drop a
      # platform from it, so they are serialized.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            # bundle.targets in tauri.conf.json is ["app","dmg"] (macOS-only),
            # so the Windows target is selected explicitly here rather than by
            # changing shared config.
            args: --bundles msi
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@10.x). Do not also
      # set a `version:` here — action-setup errors on two sources.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Notarization uses an App Store Connect API key. The bundler auto-discovers
      # the private key at ~/private_keys/AuthKey_<APPLE_API_KEY>.p8, so we write it
      # there from a base64-encoded secret (keeps newlines intact, nothing on disk
      # in the repo).
      - name: Provision App Store Connect API key
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      # The Windows MSI is currently unsigned — SmartScreen will warn on first
      # run. Signing needs a hardware-backed certificate (Azure Artifact Signing
      # or a cloud-HSM CA); wire it via bundle.windows.signCommand when available.
      - name: Build, sign, notarize, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # App Store Connect API key notarization (replaces APPLE_ID/APPLE_PASSWORD).
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Conduit ${{ github.ref_name }}"
          releaseBody: "See the assets below. Release notes:"
          releaseDraft: false
          # Hyphenated tags (v0.12.0-rc, -beta) publish as prereleases so they
          # never become the "latest" release the updater endpoint resolves to;
          # a clean vX.Y.Z is a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: true
