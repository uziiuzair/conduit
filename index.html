<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Conduit</title>
    <meta name="description" content="Run multiple real Claude Code terminals across projects, in one window." />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #0b0d10;
        color: #e6e9ef;
        text-align: center;
        padding: 2rem;
      }
      main { max-width: 34rem; }
      h1 { font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: -0.03em; }
      p { margin-top: 1rem; color: #9aa4b2; }
      a {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.7rem 1.4rem;
        border-radius: 8px;
        background: #e6e9ef;
        color: #0b0d10;
        font-weight: 600;
        text-decoration: none;
      }
      a:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <main>
      <h1>Conduit</h1>
      <p>Run multiple real Claude&nbsp;Code terminals across projects, in one window.</p>
      <a href="https://github.com/uziiuzair/conduit/releases/latest">Download for macOS</a>
    </main>
  </body>
</html>
